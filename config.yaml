# Proxy server address
addr: ":8080"

# Enable mock server mode
mock_server: false

# MITM proxy settings
mitm:
  # Enable MITM proxy
  enabled: true
  # Persist CA certificate and key
  persist_ca: true
  # Directory to store certificates
  cert_dir: "certs"

# Request/Response modification settings
modification:
  # Enable modification
  enabled: true
  # Log verbosely
  verbose: true
  # Headers to add/remove on requests
  request_headers:
    set:
      X-MITM-Proxy: "true"
      User-Agent: "nproxy/1.0"
  # Headers to add/remove on responses
  response_headers:
    set:
      X-MITM-Intercepted: "true"
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "DENY"
      X-XSS-Protection: "1; mode=block"
